# Build SliceShuffle on macOS and Windows; attach zips to a GitHub release.
# - Publish a release in the UI first (creates the tag + source zip).
# - Then run this workflow manually (Actions → Build release → Run workflow), enter the release tag (e.g. v0.1.0).
# - When it finishes, the macOS and Windows zips will appear on that release.
name: Build release

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to attach assets to (e.g. v0.1.0). Leave empty when triggering from a release.'
        required: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (macOS)
        if: matrix.os == 'macos-latest'
        run: cmake -B build -G Xcode -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Configure (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: cmake --build build --config Release

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake --build build --config Release

      - name: List build output (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          echo "=== Build tree (artefacts) ==="
          find build -type d -name '*artefacts*' 2>/dev/null || true
          echo "=== VST3 / App ==="
          find build -name '*.vst3' -o -name 'SliceShuffle.app' 2>/dev/null | head -20

      - name: List build output (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          echo "=== Build tree ==="
          Get-ChildItem -Path build -Recurse -Directory -Filter "*artefacts*" | Select-Object -ExpandProperty FullName
          echo "=== VST3 / exe ==="
          Get-ChildItem -Path build -Recurse -Include "*.vst3","SliceShuffle.exe" | Select-Object -ExpandProperty FullName

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          set -e
          VERSION="${{ github.event.inputs.tag_name || github.event.release.tag_name || github.ref_name }}"
          VERSION="${VERSION#v}"
          [ -z "$VERSION" ] || [ "$VERSION" = "main" ] && VERSION="snapshot"
          mkdir -p release
          # JUCE puts outputs in <target>_artefacts/Release/ (or sometimes without Release on single-config)
          VST3=$(find build -type d -name 'SliceShuffle.vst3' 2>/dev/null | head -1)
          APP=$(find build -type d -name 'SliceShuffle.app' 2>/dev/null | head -1)
          [ -n "$VST3" ] && cp -R "$VST3" release/
          [ -n "$APP" ] && cp -R "$APP" release/
          CLI=$(find build -type f -name 'SliceShuffleCli' -path '*/Release/*' 2>/dev/null | head -1)
          [ -z "$CLI" ] && CLI=$(find build -type f -name 'SliceShuffleCli' 2>/dev/null | head -1)
          [ -n "$CLI" ] && cp "$CLI" release/
          (cd release && zip -r "../SliceShuffle-${{ matrix.name }}-${VERSION}.zip" .)

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ver = "${{ github.event.inputs.tag_name || github.event.release.tag_name || github.ref_name }}".TrimStart('v')
          if (-not $ver -or $ver -eq 'main') { $ver = 'snapshot' }
          New-Item -ItemType Directory -Path release -Force
          $vst3 = Get-ChildItem -Path build -Recurse -Directory -Filter "SliceShuffle.vst3" | Select-Object -First 1 -ExpandProperty FullName
          if ($vst3) { Copy-Item -Recurse -Path $vst3 -Destination "release\" }
          $exe = Get-ChildItem -Path build -Recurse -Filter "SliceShuffle.exe" | Select-Object -First 1 -ExpandProperty FullName
          if ($exe) { Copy-Item -Path $exe -Destination "release\" }
          $standaloneDir = Get-ChildItem -Path build -Recurse -Directory -Filter "Standalone" | Where-Object { $_.FullName -match "SliceShufflePlugin" } | Select-Object -First 1
          if ($standaloneDir) { Copy-Item -Path "$($standaloneDir.FullName)\*" -Destination "release\" -Recurse -Force }
          $cli = Get-ChildItem -Path build -Recurse -Filter "SliceShuffleCli.exe" | Select-Object -First 1 -ExpandProperty FullName
          if ($cli) { Copy-Item -Path $cli -Destination "release\" }
          Compress-Archive -Path "release\*" -DestinationPath "SliceShuffle-${{ matrix.name }}-$ver.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SliceShuffle-${{ matrix.name }}
          path: SliceShuffle-${{ matrix.name }}-*.zip

  upload-release:
    needs: build
    # Run when we have a release event, or when manually run with a tag name
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name != '')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: SliceShuffle-*
          merge-multiple: false

      - name: Prepare release assets
        id: prepare
        run: |
          mkdir -p release-assets
          for dir in artifacts/SliceShuffle-*; do
            [ -d "$dir" ] || continue
            zip=$(find "$dir" -maxdepth 1 -name '*.zip' -print -quit)
            [ -n "$zip" ] && cp "$zip" "release-assets/$(basename "$dir").zip"
          done
          ls -la release-assets/
          [ -n "$(ls -A release-assets 2>/dev/null)" ] || { echo "No zip artifacts found"; exit 1; }
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          for f in release-assets/*.zip; do [ -f "$f" ] && echo "$f" >> "$GITHUB_OUTPUT"; done
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag_name }}
          files: ${{ steps.prepare.outputs.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
